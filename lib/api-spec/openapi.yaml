openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Meter Truck Tracking System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trucks
    description: Truck management
  - name: meters
    description: Meter management
  - name: deliveries
    description: Delivery management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /trucks:
    get:
      operationId: getTrucks
      tags: [trucks]
      summary: Get all trucks
      responses:
        "200":
          description: List of trucks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Truck"
    post:
      operationId: createTruck
      tags: [trucks]
      summary: Create a new truck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTruckRequest"
      responses:
        "201":
          description: Created truck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Truck"

  /trucks/{truckId}:
    get:
      operationId: getTruck
      tags: [trucks]
      summary: Get a truck by ID
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Truck details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TruckWithMeters"
        "404":
          description: Truck not found
    delete:
      operationId: deleteTruck
      tags: [trucks]
      summary: Delete a truck
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Truck deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /trucks/{truckId}/location:
    get:
      operationId: getTruckLocation
      tags: [trucks]
      summary: Get simulated truck location
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Truck location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TruckLocation"

  /trucks/locations/all:
    get:
      operationId: getAllTruckLocations
      tags: [trucks]
      summary: Get all truck locations
      responses:
        "200":
          description: All truck locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TruckLocation"

  /meters:
    get:
      operationId: getMeters
      tags: [meters]
      summary: Get all meters
      parameters:
        - name: truckId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of meters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meter"
    post:
      operationId: createMeter
      tags: [meters]
      summary: Create a new meter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeterRequest"
      responses:
        "201":
          description: Created meter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meter"

  /meters/deliver:
    post:
      operationId: scanDeliver
      tags: [meters]
      summary: Mark a meter as delivered via QR scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanDeliverRequest"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDeliverResponse"

  /meters/{meterId}:
    get:
      operationId: getMeter
      tags: [meters]
      summary: Get a meter by ID
      parameters:
        - name: meterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meter details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meter"
        "404":
          description: Meter not found
    put:
      operationId: updateMeter
      tags: [meters]
      summary: Update a meter
      parameters:
        - name: meterId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeterRequest"
      responses:
        "200":
          description: Updated meter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meter"
    delete:
      operationId: deleteMeter
      tags: [meters]
      summary: Delete a meter
      parameters:
        - name: meterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meter deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /deliveries:
    get:
      operationId: getDeliveries
      tags: [deliveries]
      summary: Get all deliveries
      responses:
        "200":
          description: List of deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Delivery"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Confirm a delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryRequest"
      responses:
        "201":
          description: Delivery confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{deliveryId}:
    get:
      operationId: getDelivery
      tags: [deliveries]
      summary: Get delivery by ID
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /stats:
    get:
      operationId: getStats
      tags: [trucks]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Truck:
      type: object
      properties:
        id:
          type: integer
        numberPlate:
          type: string
        status:
          type: string
          enum: [READY, WARNING]
        deliveryStatus:
          type: string
          enum: [pending, delivered]
        createdAt:
          type: string
          format: date-time
        meterCount:
          type: integer
        activeMeterCount:
          type: integer
      required:
        - id
        - numberPlate
        - status
        - deliveryStatus
        - createdAt
        - meterCount
        - activeMeterCount

    TruckWithMeters:
      type: object
      properties:
        id:
          type: integer
        numberPlate:
          type: string
        status:
          type: string
          enum: [READY, WARNING]
        createdAt:
          type: string
          format: date-time
        meters:
          type: array
          items:
            $ref: "#/components/schemas/Meter"
      required:
        - id
        - numberPlate
        - status
        - createdAt
        - meters

    CreateTruckRequest:
      type: object
      properties:
        numberPlate:
          type: string
      required:
        - numberPlate

    TruckLocation:
      type: object
      properties:
        truckId:
          type: integer
        numberPlate:
          type: string
        lat:
          type: number
        lng:
          type: number
        timestamp:
          type: string
          format: date-time
      required:
        - truckId
        - numberPlate
        - lat
        - lng
        - timestamp

    Meter:
      type: object
      properties:
        id:
          type: integer
        meterId:
          type: string
        status:
          type: string
          enum: [active, inactive]
        meterDeliveryStatus:
          type: string
          enum: [pending, delivered]
        truckId:
          type: integer
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - meterId
        - status
        - meterDeliveryStatus
        - truckId
        - createdAt

    ScanDeliverRequest:
      type: object
      properties:
        meterIdText:
          type: string
        truckId:
          type: integer
      required:
        - meterIdText
        - truckId

    ScanDeliverResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        meter:
          $ref: "#/components/schemas/Meter"
      required:
        - success
        - message

    CreateMeterRequest:
      type: object
      properties:
        meterId:
          type: string
        truckId:
          type: integer
      required:
        - meterId
        - truckId

    UpdateMeterRequest:
      type: object
      properties:
        meterId:
          type: string
        status:
          type: string
          enum: [active, inactive]
        truckId:
          type: integer

    Delivery:
      type: object
      properties:
        id:
          type: integer
        truckId:
          type: integer
        numberPlate:
          type: string
        photoUrl:
          type: string
          nullable: true
        confirmedAt:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
      required:
        - id
        - truckId
        - numberPlate
        - confirmedAt

    CreateDeliveryRequest:
      type: object
      properties:
        truckId:
          type: integer
        photoUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - truckId

    DashboardStats:
      type: object
      properties:
        totalTrucks:
          type: integer
        totalMeters:
          type: integer
        activeMeters:
          type: integer
        inactiveMeters:
          type: integer
        readyTrucks:
          type: integer
        warningTrucks:
          type: integer
        deliveredTrucks:
          type: integer
      required:
        - totalTrucks
        - totalMeters
        - activeMeters
        - inactiveMeters
        - readyTrucks
        - warningTrucks
        - deliveredTrucks

    SuccessMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message
